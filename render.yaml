# Render blueprint for LaborGuard backend microservices.
#
# Cross-service eventing is HTTP-based (no Kafka). Producers POST to
# `/api/internal/events/:topic` on consumer services, guarded by a shared
# INTERNAL_SERVICE_SECRET header.
#
# Secret values (MONGODB_URI, JWT secrets, INTERNAL_SERVICE_SECRET, Cloudinary,
# Resend, OpenAI, GROQ, Google OAuth, Centrifugo) must be configured per-service
# in the Render dashboard. `sync: false` keeps the dashboard value authoritative.

services:
  # ── Auth Service ───────────────────────────────────────────────────────────
  - type: web
    name: laborguard-auth-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/auth-service
    buildCommand: npm ci --no-audit --no-fund
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: auth-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-auth
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://laborguard-auth-service-szvs.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://labor-guard-15vm.vercel.app
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Email (Resend) — used for OTP verification, password reset, approval/rejection
      - key: RESEND_API_KEY
        sync: false
      - key: SYSTEM_DEFAULT_EMAIL
        sync: false
      # Validates x-internal-secret on /api/auth/internal/* (called by notification-service).
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      # auth-service emits cross-service events over HTTP to these consumers.
      - key: NOTIFICATION_SERVICE_URL
        value: https://laborguard-notification-service-szvs.onrender.com
      - key: COMMUNITY_SERVICE_URL
        value: https://laborguard-community-service-szvs.onrender.com

  # ── Community Service ──────────────────────────────────────────────────────
  - type: web
    name: laborguard-community-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/community-service
    buildCommand: npm ci --no-audit --no-fund
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: community-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-community
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TOXICITY_THRESHOLD
        value: "0.7"
      - key: NSFW_THRESHOLD
        value: "0.5"
      # NSFWJS + TensorFlow loads a ~200MB model and OOMs Render free-tier
      # (512MB cap). Disable by default; flip to "false" on a paid plan to
      # re-enable image moderation.
      - key: DISABLE_NSFW_CHECK
        value: "true"
      # Validates x-internal-secret on /api/internal/events/* and emits its own.
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        value: https://laborguard-notification-service-szvs.onrender.com

  # ── Complaint Service ──────────────────────────────────────────────────────
  - type: web
    name: laborguard-complaint-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/complaint-service
    # cloudinary peer-dep mismatch with multer-storage-cloudinary — known and harmless.
    buildCommand: npm ci --no-audit --no-fund --legacy-peer-deps
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: complaint-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-complaint
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SYSTEM_DEFAULT_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://labor-guard-15vm.vercel.app
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        value: https://laborguard-notification-service-szvs.onrender.com
      - key: COMMUNITY_SERVICE_URL
        value: https://laborguard-community-service-szvs.onrender.com
      - key: MESSAGING_SERVICE_URL
        value: https://laborguard-messaging-service-szvs.onrender.com

  # ── Notification Service ───────────────────────────────────────────────────
  - type: web
    name: laborguard-notification-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/notification-service
    buildCommand: npm ci --no-audit --no-fund
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: notification-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-notification
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SYSTEM_DEFAULT_EMAIL
        sync: false
      # Cross-service: receives events from siblings, looks up user emails on auth-service.
      - key: AUTH_SERVICE_URL
        value: https://laborguard-auth-service-szvs.onrender.com
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: APP_URL
        value: https://labor-guard-15vm.vercel.app

  # ── Messaging Service ──────────────────────────────────────────────────────
  - type: web
    name: laborguard-messaging-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/messaging-service
    buildCommand: npm ci --no-audit --no-fund
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: messaging-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-messaging
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CENTRIFUGO_URL
        sync: false
      - key: CENTRIFUGO_API_URL
        sync: false
      - key: CENTRIFUGO_API_KEY
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        value: https://laborguard-notification-service-szvs.onrender.com

  # ── Job Service ────────────────────────────────────────────────────────────
  - type: web
    name: laborguard-jobs-service
    runtime: node
    region: singapore
    plan: free
    rootDir: backend/services/job-service
    buildCommand: npm ci --no-audit --no-fund --include=dev
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVICE_NAME
        value: job-service
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: laborguard-jobs
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SYSTEM_DEFAULT_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://labor-guard-15vm.vercel.app

  # ── Centrifugo (real-time messaging gateway) ───────────────────────────────
  # Image-based service — no Node build, just pulls the upstream Docker image.
  # Bound to JWT_ACCESS_SECRET so its HMAC matches the token messaging-service
  # signs (frontend useRealtime reuses the access token verbatim). Both must
  # share the same secret or real-time silently fails.
  #
  # Centrifugo v5 rejects --token_hmac_secret_key/--api_key as CLI flags; these
  # have to be passed as env vars (CENTRIFUGO_*) which the binary auto-discovers.
  - type: web
    name: laborguard-centrifugo
    runtime: image
    image:
      url: docker.io/centrifugo/centrifugo:v5
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    dockerCommand: centrifugo --port=10000 --health
    envVars:
      # Centrifugo's HMAC secret for verifying connection JWTs. MUST equal
      # JWT_ACCESS_SECRET on every Node service (paste the same value).
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        sync: false
      # Server-API auth key. MUST equal CENTRIFUGO_API_KEY on messaging-service.
      - key: CENTRIFUGO_API_KEY
        sync: false
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"
