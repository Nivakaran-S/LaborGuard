name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - complaint-service
          - community-service
          - messaging-service
          - notification-service
          - job-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/services/${{ matrix.service }}/package-lock.json

      - name: Install deps
        working-directory: backend/services/${{ matrix.service }}
        # --include=dev guards against NODE_ENV=production accidentally
        # excluding jest/supertest from the install.
        run: npm ci --no-audit --no-fund --include=dev
        env:
          NODE_ENV: development

      - name: Syntax check
        working-directory: backend/services/${{ matrix.service }}
        run: |
          for f in $(find src -name '*.js'); do
            node -c "$f" || exit 1
          done

      - name: Run tests
        working-directory: backend/services/${{ matrix.service }}
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          MONGODB_URI: mongodb://127.0.0.1:27017/laborguard-ci
        run: npm test -- --passWithNoTests --ci

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint (advisory)
        working-directory: frontend
        # 53 pre-existing lint errors (unused vars, vite.config.js __dirname)
        # tracked separately. Lint is reported but doesn't block builds —
        # Vercel only runs `npm run build`, which is the gating check.
        continue-on-error: true
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        env:
          # Build-time URLs use placeholders — real values come from Vercel env.
          VITE_AUTH_SERVICE_URL: http://localhost:5001/api
          VITE_COMMUNITY_SERVICE_URL: http://localhost:5002/api
          VITE_COMPLAINT_SERVICE_URL: http://localhost:5003/api
          VITE_NOTIFICATION_SERVICE_URL: http://localhost:5004/api
          VITE_MESSAGING_SERVICE_URL: http://localhost:5005/api
          VITE_JOB_SERVICE_URL: http://localhost:5006/api
        run: npm run build
