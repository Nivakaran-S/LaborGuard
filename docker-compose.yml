# ══════════════════════════════════════════════════════════════════════════════
# LaborGuard — docker-compose.yml
#
# Place this file at the PROJECT ROOT:
#   LaborGuard/
#     docker-compose.yml   ← this file
#     .env                 ← copy from .env.example, fill in real values
#     backend/
#     frontend/
#
# Cross-service eventing is HTTP-based (no Kafka). Producers POST to
# `/api/internal/events/:topic` on consumer services, guarded by
# INTERNAL_SERVICE_SECRET. See backend/services/*/src/utils/kafkaProducer.js
# for the legacy-named-but-now-HTTP emitter.
#
# Start everything:   docker compose up --build
# Backend only:       docker compose up --build centrifugo auth-service community-service complaint-service notification-service messaging-service job-service
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════
  # INFRASTRUCTURE — only Centrifugo now (Kafka removed in favour of HTTP)
  # ════════════════════════════════════════

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: laborguard-centrifugo
    ports:
      - "8000:8000"
    command: centrifugo --config=config.json
    volumes:
      - ./backend/infra/centrifugo/config.json:/centrifugo/config.json:ro
    networks:
      - laborguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    image: laborguard/auth-service:latest
    container_name: laborguard-auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SERVICE_NAME=auth-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-auth
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      # auth-service emits cross-service events over HTTP to these consumers
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
      - COMMUNITY_SERVICE_URL=http://community-service:5002
    volumes:
      - ./backend/services/auth-service:/app
      - /app/node_modules
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  community-service:
    build:
      context: ./backend/services/community-service
      dockerfile: Dockerfile
    image: laborguard/community-service:latest
    container_name: laborguard-community-service
    ports:
      - "5002:5002"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5002
      - SERVICE_NAME=community-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-community
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TOXICITY_THRESHOLD=0.7
      - NSFW_THRESHOLD=0.5
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  complaint-service:
    build:
      context: ./backend/services/complaint-service
      dockerfile: Dockerfile
    image: laborguard/complaint-service:latest
    container_name: laborguard-complaint-service
    ports:
      - "5003:5003"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5003
      - SERVICE_NAME=complaint-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-complaint
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
      - COMMUNITY_SERVICE_URL=http://community-service:5002
      - MESSAGING_SERVICE_URL=http://messaging-service:5005
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend/services/notification-service
      dockerfile: Dockerfile
    image: laborguard/notification-service:latest
    container_name: laborguard-notification-service
    ports:
      - "5004:5004"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5004
      - SERVICE_NAME=notification-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-notification
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SYSTEM_DEFAULT_EMAIL=${SYSTEM_DEFAULT_EMAIL}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      # Cross-service: looks up user emails on auth-service via HTTP+secret.
      - AUTH_SERVICE_URL=http://auth-service:5001
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - APP_URL=${APP_URL:-https://labor-guard.vercel.app}
    depends_on:
      auth-service:
        condition: service_started
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  messaging-service:
    build:
      context: ./backend/services/messaging-service
      dockerfile: Dockerfile
    image: laborguard/messaging-service:latest
    container_name: laborguard-messaging-service
    ports:
      - "5005:5005"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5005
      - SERVICE_NAME=messaging-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-messaging
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
    depends_on:
      centrifugo:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  job-service:
    build:
      context: ./backend/services/job-service
      dockerfile: Dockerfile
    image: laborguard/job-service:latest
    container_name: laborguard-job-service
    ports:
      - "5006:5006"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5006
      - SERVICE_NAME=job-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-jobs
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      # job-service has no cross-service events to emit, so no INTERNAL_* envs.
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ════════════════════════════════════════
  # FRONTEND
  # ════════════════════════════════════════

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-http://localhost:5001}
        VITE_COMMUNITY_SERVICE_URL: ${VITE_COMMUNITY_SERVICE_URL:-http://localhost:5002}
        VITE_COMPLAINT_SERVICE_URL: ${VITE_COMPLAINT_SERVICE_URL:-http://localhost:5003}
        VITE_NOTIFICATION_SERVICE_URL: ${VITE_NOTIFICATION_SERVICE_URL:-http://localhost:5004}
        VITE_MESSAGING_SERVICE_URL: ${VITE_MESSAGING_SERVICE_URL:-http://localhost:5005}
        VITE_JOB_SERVICE_URL: ${VITE_JOB_SERVICE_URL:-http://localhost:5006}
        VITE_CENTRIFUGO_URL: ${VITE_CENTRIFUGO_URL:-ws://localhost:8000/connection/websocket}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    image: laborguard/frontend:latest
    container_name: laborguard-frontend
    ports:
      - "3000:80"
    networks:
      - laborguard-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  laborguard-network:
    driver: bridge
